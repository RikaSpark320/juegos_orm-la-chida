name: Python CI Flask

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Esto solo afecta a las herramientas de GitHub, NO a tu código Flask
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout de codigo
      uses: actions/checkout@v4

    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependencias de tu App
      run: |
        python -m pip install --upgrade pip
        # Aquí es donde vive tu Flask
        pip install flask flask-sqlalchemy flask-wtf flask-login wtforms werkzeug pymysql pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ejecutar pruebas de Flask (Pytest)
      run: |
        pytest --cov=. --cov-report=xml

    - name: Subir reporte a Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false
