name: Python CI Flask

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest  # Cambiado a Linux

    steps:
    - name: Checkout de codigo
      uses: actions/checkout@v4

    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        # Instalamos las librerías necesarias para tu proyecto Flask
        pip install flask flask-sqlalchemy flask-wtf flask-login wtforms werkzeug pymysql pytest pytest-cov
        # Sintaxis de Linux (Bash) para verificar si existe el archivo
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ejecutar pruebas con Pytest
      run: |
        # Generamos el reporte xml para que Codecov lo pueda leer
        pytest --cov=. --cov-report=xml

    - name: Subir reporte a Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # Obligatorio en versiones recientes de la v4
        file: ./coverage.xml
        fail_ci_if_error: false
