name: Python CI Flask

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: juegos
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout de codigo
      uses: actions/checkout@v4

    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flask flask-sqlalchemy flask-wtf flask-login wtforms werkzeug pymysql pytest pytest-cov cryptography
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ejecutar pruebas (Pytest)
      env:
        DATABASE_URL: mysql+pymysql://root@127.0.0.1:3306/juegos
      run: |
        pytest --cov=. --cov-report=xml

    - name: Subir reporte a Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false
